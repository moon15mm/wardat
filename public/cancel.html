<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم إلغاء الدفع | وردات</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c20 0%, #1a1040 50%, #060214 100%);
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 50px 40px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255, 75, 75, 0.1);
      border: 2px solid rgba(255, 75, 75, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 25px;
    }

    .icon {
      font-size: 3rem;
    }

    h1 {
      color: #ff6b6b;
      font-size: 1.9rem;
      font-weight: 800;
      margin-bottom: 12px;
    }

    p {
      color: #b1a9c3;
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .retry-note {
      background: rgba(255, 75, 75, 0.06);
      border: 1px solid rgba(255, 75, 75, 0.2);
      border-radius: 12px;
      padding: 16px;
      color: #ff9898;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 25px;
    }

    .retry-note span { font-size: 1.5rem; }

    .btn-retry {
      display: inline-block;
      background: linear-gradient(135deg, #ff2d81, #8e2de2);
      color: #fff;
      text-decoration: none;
      padding: 12px 30px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      transition: opacity 0.2s;
    }

    .btn-retry:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <span class="icon">❌</span>
    </div>
    <h1>تم إلغاء الدفع</h1>
    <p>لم يتم إتمام عملية الدفع. طلبك لم يُؤكد بعد ولن يتم التوصيل.</p>

    <div class="retry-note">
      <span>⚠️</span>
      <div>إذا كنت تواجه مشكلة في الدفع، يمكنك التواصل مع المتجر مباشرة عبر الواتساب لإعادة المحاولة.</div>
    </div>
  </div>
</body>
</html>
