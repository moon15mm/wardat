<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعادة تعيين كلمة المرور | منصة وردات</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #060214 100%);
      --pink-glow: #ff2d81;
      --purple-glow: #8e2de2;
      --text-main: #f5f3f7;
      --text-sub: #b1a9c3;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.07);
    }
    body.light-mode {
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
      --text-main: #1f1f2e;
      --text-sub: #5f6368;
      --glass-bg: rgba(255, 255, 255, 0.8);
      --glass-border: rgba(0, 0, 0, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', 'Outfit', sans-serif; }
    body {
      background: var(--bg-gradient); min-height: 100vh; display: flex;
      justify-content: center; align-items: center; color: var(--text-main);
      overflow: hidden; position: relative;
    }
    body::before, body::after {
      content: ''; position: absolute; width: 300px; height: 300px;
      border-radius: 50%; filter: blur(120px); z-index: 0; opacity: 0.4;
    }
    body::before { background: var(--pink-glow); top: 15%; left: 15%; }
    body::after { background: var(--purple-glow); bottom: 15%; right: 15%; }
    .container { position: relative; z-index: 10; width: 100%; max-width: 440px; padding: 20px; }
    .card {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 24px; padding: 40px 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center;
    }
    .logo {
      font-size: 2.2rem; font-weight: 700;
      background: linear-gradient(to left, var(--pink-glow), var(--purple-glow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px; letter-spacing: 1px;
    }
    .subtitle { color: var(--text-sub); font-size: 0.95rem; margin-bottom: 30px; }
    .form-group { margin-bottom: 22px; text-align: right; }
    label { display: block; font-size: 0.85rem; color: var(--text-sub); margin-bottom: 8px; padding-right: 4px; }
    input {
      width: 100%; padding: 14px 18px; border-radius: 12px; border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.2); color: var(--text-main); font-size: 0.95rem; outline: none;
      transition: all 0.3s ease; text-align: right;
    }
    input:focus { border-color: var(--pink-glow); box-shadow: 0 0 12px rgba(255,45,129,0.2); }
    body.light-mode input { background: rgba(255,255,255,0.9); border-color: rgba(0,0,0,0.15); }
    .btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(to right, var(--pink-glow), var(--purple-glow));
      color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 10px;
      box-shadow: 0 4px 15px rgba(255,45,129,0.3); transition: all 0.3s ease;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,45,129,0.5); }
    .msg {
      padding: 12px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 20px;
      display: none; text-align: center;
    }
    .msg.error { background: rgba(255,75,75,0.1); border: 1px solid rgba(255,75,75,0.25); color: #ff6b6b; }
    .msg.success { background: rgba(45,255,150,0.08); border: 1px solid rgba(45,255,150,0.25); color: #4ade80; }
    .link { display:inline-block; margin-top:18px; color: var(--text-sub); font-size:0.85rem; text-decoration:none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">وردات | WARDAT</div>
      <div class="subtitle">تعيين كلمة مرور جديدة</div>

      <div id="msgBox" class="msg"></div>

      <form id="resetForm" onsubmit="handleReset(event)">
        <div class="form-group">
          <label for="password">كلمة المرور الجديدة</label>
          <input type="password" id="password" placeholder="6 أحرف على الأقل" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirm">تأكيد كلمة المرور</label>
          <input type="password" id="confirm" placeholder="أعد إدخال كلمة المرور" required minlength="6">
        </div>
        <button type="submit" class="btn">حفظ كلمة المرور</button>
      </form>

      <a href="/login" class="link">العودة لتسجيل الدخول</a>
    </div>
  </div>

  <script>
    const savedTheme = localStorage.getItem('wardat_theme') || 'dark';
    if (savedTheme === 'light') document.body.classList.add('light-mode');

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token') || '';
    }

    const token = getToken();
    if (!token) {
      const box = document.getElementById('msgBox');
      box.textContent = 'رابط إعادة التعيين غير صالح. يرجى طلب رابط جديد من صفحة الدخول.';
      box.className = 'msg error';
      box.style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
    }

    async function handleReset(e) {
      e.preventDefault();
      const box = document.getElementById('msgBox');
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      box.style.display = 'none';

      if (password !== confirm) {
        box.textContent = 'كلمتا المرور غير متطابقتين.';
        box.className = 'msg error';
        box.style.display = 'block';
        return;
      }

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await response.json();

        if (!response.ok) throw new Error(data.error || 'تعذّر تغيير كلمة المرور.');

        box.textContent = data.message || 'تم تغيير كلمة المرور بنجاح.';
        box.className = 'msg success';
        box.style.display = 'block';
        document.getElementById('resetForm').style.display = 'none';
        setTimeout(() => { window.location.href = '/login'; }, 2500);
      } catch (err) {
        box.textContent = err.message;
        box.className = 'msg error';
        box.style.display = 'block';
      }
    }
  </script>
</body>
</html>
