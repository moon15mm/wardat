<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | منصة وردات SaaS</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #060214 100%);
      --pink-glow: #ff2d81;
      --purple-glow: #8e2de2;
      --text-main: #f5f3f7;
      --text-sub: #b1a9c3;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.07);
      --glass-hover: rgba(255, 255, 255, 0.06);
    }

    body.light-mode {
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
      --text-main: #1f1f2e;
      --text-sub: #5f6368;
      --glass-bg: rgba(255, 255, 255, 0.8);
      --glass-border: rgba(0, 0, 0, 0.08);
      --glass-hover: rgba(0, 0, 0, 0.04);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Tajawal', 'Outfit', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
      overflow: hidden;
      position: relative;
    }

    /* Ambient background glows */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      opacity: 0.4;
    }
    body::before {
      background: var(--pink-glow);
      top: 15%;
      left: 15%;
    }
    body::after {
      background: var(--purple-glow);
      bottom: 15%;
      right: 15%;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .login-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .logo {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(to left, var(--pink-glow), var(--purple-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .subtitle {
      color: var(--text-sub);
      font-size: 0.95rem;
      margin-bottom: 35px;
    }

    .form-group {
      margin-bottom: 22px;
      text-align: right;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-sub);
      margin-bottom: 8px;
      padding-right: 4px;
    }

    .input-wrapper {
      position: relative;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text-main);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
      text-align: right;
    }

    input:focus {
      border-color: var(--pink-glow);
      box-shadow: 0 0 12px rgba(255, 45, 129, 0.2);
      background: rgba(0, 0, 0, 0.35);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(to right, var(--pink-glow), var(--purple-glow));
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 15px;
      box-shadow: 0 4px 15px rgba(255, 45, 129, 0.3);
      transition: all 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 45, 129, 0.5);
    }

    .btn-login:active {
      transform: translateY(1px);
    }

    .error-msg {
      background: rgba(255, 75, 75, 0.1);
      border: 1px solid rgba(255, 75, 75, 0.25);
      color: #ff6b6b;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      text-align: center;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* Light Mode Overrides */
    body.light-mode input {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(0, 0, 0, 0.15);
      color: var(--text-main);
    }
    body.light-mode input:focus {
      background: #ffffff;
      border-color: var(--purple-glow);
    }
    body.light-mode .login-card {
      background: var(--glass-bg);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
    }

    .theme-toggle-float {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.1rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      z-index: 100;
    }
  </style>
</head>
<body>
  
  <button id="themeToggleBtn" class="theme-toggle-float" onclick="toggleTheme()">🌞</button>

  <div class="container">
    <div class="login-card">
      <div class="logo">وردات | WARDAT</div>
      <div class="subtitle">منصة أتمتة وإدارة محلات الورد الذكية</div>

      <div id="errorBox" class="error-msg"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">اسم المستخدم</label>
          <div class="input-wrapper">
            <input type="text" id="username" placeholder="أدخل اسم المستخدم" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
          </div>
        </div>

        <div class="form-group" style="margin-bottom:18px;">
          <label for="rememberMe" style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:0.9rem; color:var(--text-sub); font-weight:normal;">
            <input type="checkbox" id="rememberMe" style="width:18px; height:18px; accent-color:var(--purple-glow); cursor:pointer; flex:0 0 auto;">
            <span>تذكّرني (حفظ بيانات الدخول)</span>
          </label>
        </div>

        <button type="submit" class="btn-login">دخول للوحة التحكم</button>
      </form>

      <div style="margin-top:18px; text-align:center;">
        <a href="#" onclick="showForgot(event)" style="color:var(--text-sub); font-size:0.85rem; text-decoration:none; border-bottom:1px dashed var(--glass-border); padding-bottom:2px;">نسيت كلمة المرور؟</a>
      </div>

      <!-- Forgot password form (hidden by default) -->
      <form id="forgotForm" onsubmit="handleForgot(event)" style="display:none; margin-top:25px; border-top:1px solid var(--glass-border); padding-top:25px;">
        <div id="forgotMsg" class="error-msg" style="background:rgba(45,255,150,0.08); border-color:rgba(45,255,150,0.25); color:#4ade80;"></div>
        <div class="form-group">
          <label for="forgotEmail">البريد الإلكتروني المسجّل</label>
          <div class="input-wrapper">
            <input type="email" id="forgotEmail" placeholder="أدخل بريدك الإلكتروني" required>
          </div>
        </div>
        <button type="submit" class="btn-login">إرسال رابط الاستعادة</button>
        <div style="margin-top:14px; text-align:center;">
          <a href="#" onclick="hideForgot(event)" style="color:var(--text-sub); font-size:0.85rem; text-decoration:none;">العودة لتسجيل الدخول</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Theme logic
    function initTheme() {
      const savedTheme = localStorage.getItem('wardat_theme') || 'dark';
      const btn = document.getElementById('themeToggleBtn');
      if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        if (btn) btn.textContent = '🌙';
      } else {
        document.body.classList.remove('light-mode');
        if (btn) btn.textContent = '🌞';
      }
    }

    function toggleTheme() {
      const isLight = document.body.classList.toggle('light-mode');
      localStorage.setItem('wardat_theme', isLight ? 'light' : 'dark');
      const btn = document.getElementById('themeToggleBtn');
      if (btn) btn.textContent = isLight ? '🌙' : '🌞';
    }

    // Redirect if already logged in
    window.onload = () => {
      initTheme();
      const token = localStorage.getItem('wardat_token');
      const role = localStorage.getItem('wardat_role');
      if (token && role) {
        if (role === 'superadmin') {
          window.location.href = '/superadmin';
          return;
        } else if (role === 'shop') {
          window.location.href = '/dashboard';
          return;
        }
      }
      // Pre-fill saved credentials if "remember me" was enabled
      if (localStorage.getItem('wardat_remember') === '1') {
        document.getElementById('username').value = localStorage.getItem('wardat_saved_username') || '';
        document.getElementById('password').value = localStorage.getItem('wardat_saved_password') || '';
        const cb = document.getElementById('rememberMe');
        if (cb) cb.checked = true;
      }
    };

    async function handleLogin(e) {
      e.preventDefault();
      const errorBox = document.getElementById('errorBox');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      errorBox.style.display = 'none';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'خطأ في عملية تسجيل الدخول');
        }

        // Store auth data
        localStorage.setItem('wardat_token', data.token);
        localStorage.setItem('wardat_role', data.role);
        if (data.shopId) localStorage.setItem('wardat_shop_id', data.shopId);
        localStorage.setItem('wardat_name', data.name);

        // Remember-me: persist or clear saved login credentials
        const rememberMe = document.getElementById('rememberMe');
        if (rememberMe && rememberMe.checked) {
          localStorage.setItem('wardat_remember', '1');
          localStorage.setItem('wardat_saved_username', username);
          localStorage.setItem('wardat_saved_password', password);
        } else {
          localStorage.removeItem('wardat_remember');
          localStorage.removeItem('wardat_saved_username');
          localStorage.removeItem('wardat_saved_password');
        }

        // Redirect based on role
        if (data.role === 'superadmin') {
          window.location.href = '/superadmin';
        } else {
          window.location.href = '/dashboard';
        }
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
      }
    }

    // Forgot-password UI toggles
    function showForgot(e) {
      e.preventDefault();
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('errorBox').style.display = 'none';
      document.getElementById('forgotForm').style.display = 'block';
    }

    function hideForgot(e) {
      e.preventDefault();
      document.getElementById('forgotForm').style.display = 'none';
      document.getElementById('forgotMsg').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
    }

    async function handleForgot(e) {
      e.preventDefault();
      const msgBox = document.getElementById('forgotMsg');
      const email = document.getElementById('forgotEmail').value.trim();
      msgBox.style.display = 'none';

      try {
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        // Always a generic success message (no email enumeration).
        msgBox.textContent = data.message || 'إذا كان البريد مسجلاً، ستصلك رسالة بخطوات الاستعادة.';
        msgBox.style.display = 'block';
      } catch (err) {
        msgBox.textContent = 'تعذّر إرسال الطلب. يرجى المحاولة لاحقاً.';
        msgBox.style.display = 'block';
      }
    }
  </script>
</body>
</html>
