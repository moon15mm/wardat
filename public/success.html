<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم الدفع بنجاح | وردات</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c20 0%, #1a1040 50%, #060214 100%);
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 50px 40px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(0, 230, 118, 0.12);
      border: 2px solid rgba(0, 230, 118, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 25px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.3); }
      50%       { box-shadow: 0 0 0 15px rgba(0, 230, 118, 0); }
    }

    .checkmark {
      font-size: 3rem;
    }

    h1 {
      color: #00e676;
      font-size: 1.9rem;
      font-weight: 800;
      margin-bottom: 12px;
    }

    p {
      color: #b1a9c3;
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .order-badge {
      display: inline-block;
      background: rgba(0, 230, 118, 0.1);
      border: 1px solid rgba(0, 230, 118, 0.3);
      color: #00e676;
      font-size: 0.9rem;
      padding: 8px 20px;
      border-radius: 50px;
      margin-bottom: 30px;
      font-weight: 600;
    }

    .whatsapp-note {
      background: rgba(37, 211, 102, 0.08);
      border: 1px solid rgba(37, 211, 102, 0.2);
      border-radius: 12px;
      padding: 16px;
      color: #25D366;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .whatsapp-note span { font-size: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <span class="checkmark">✅</span>
    </div>
    <h1>تم الدفع بنجاح!</h1>
    <p>شكراً لك! تم استلام طلبك وسيتم التواصل معك قريباً لتأكيد التوصيل.</p>

    <div class="order-badge">🎉 طلبك قيد التجهيز الآن</div>

    <div class="whatsapp-note">
      <span>💬</span>
      <div>سيصلك رسالة تأكيد على الواتساب تحتوي على تفاصيل طلبك ورقمه.</div>
    </div>
  </div>
</body>
</html>
