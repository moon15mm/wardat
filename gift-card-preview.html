<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة بطاقة الإهداء</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .card-container {
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#fdfbfb" />
              <stop offset="100%" stop-color="#ebedee" />
            </linearGradient>
          </defs>
          <rect width="100%" height="100%" fill="url(#bg)" rx="20" ry="20" />
          
          <!-- Content -->
          <text x="50%" y="25%" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#333" text-anchor="middle" direction="rtl">بطاقة إهداء من متجر وردات</text>
          
          <text x="50%" y="50%" font-family="Arial, sans-serif" font-size="36" fill="#555" text-anchor="middle" direction="rtl">كل عام وأنت بخير، أتمنى لك يوماً سعيداً ومليئاً بالفرح!</text>
          
          <text x="50%" y="75%" font-family="Arial, sans-serif" font-size="28" font-style="italic" fill="#777" text-anchor="middle" direction="rtl">المرسل: ماهر</text>
        </svg>
    </div>
</body>
</html>
